name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ '21' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build, test, and verify samples
      run: |
        ./gradlew clean build --stacktrace
        ./gradlew -p samples/xslt-basic verifySample --stacktrace
        ./gradlew -p samples/xquery-basic verifySample --stacktrace
        ./gradlew -p samples/validation-basic verifySample --stacktrace

